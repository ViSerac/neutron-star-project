name: Update Catalog

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            psrqpy \
            astropy \
            pandas \
            scikit-learn \
            pyarrow \
            scipy

      - name: Run pipeline
        working-directory: pipeline
        run: |
          python fetch_atnf.py
          python fetch_mcgill.py
          python transform_coords_atnf.py
          python transform_coords_mcgill.py
          python m7andcco.py
          python concat_catalogs.py
          python export_json.py
          python export_catalog.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            site/data/NS_db_full.json \
            site/data/NS_catalog_full.json

          git diff --cached --quiet || git commit -m "auto: update catalog data $(date -u '+%Y-%m-%d')"

          git push