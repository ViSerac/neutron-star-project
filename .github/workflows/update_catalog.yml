name: Update Catalog

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install psrqpy astropy pandas scikit-learn pyarrow scipy

      - name: Fix working directory issue in fetch_atnf
        run: |
          python3 -c "
import pathlib
f = pathlib.Path('pipeline/fetch_atnf.py')
content = f.read_text()
fix = 'import os, pathlib\nos.chdir(pathlib.Path(__file__).parent)\n'
if 'os.chdir' not in content:
    content = fix + content
    f.write_text(content)
    print('Patched fetch_atnf.py')
else:
    print('Already patched')
"

      - name: Run pipeline
        working-directory: pipeline
        run: |
          mkdir -p data
          python fetch_atnf.py
          python fetch_mcgill.py
          python transform_coords_atnf.py
          python transform_coords_mcgill.py
          python m7andcco.py
          python concat_catalogs.py
          python export_json.py
          python export_catalog.py

      - name: Copy JSON outputs to docs
        run: |
          cp pipeline/data/NS_db_full.json docs/data/NS_db_full.json
          cp pipeline/data/NS_catalog_full.json docs/data/NS_catalog_full.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/NS_db_full.json docs/data/NS_catalog_full.json
          git diff --cached --quiet || git commit -m "auto: update catalog data $(date -u '+%Y-%m-%d')"
          git push
